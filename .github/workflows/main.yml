name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev wget

      - name: Install libtinfo5 manually (fix for Ubuntu 22.04)
        run: |
          wget http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2_amd64.deb
          sudo dpkg -i libtinfo5_6.3-2_amd64.deb || true
          sudo apt install -f -y

      - name: Install Cython and Buildozer
        run: |
          pip install --upgrade pip
          pip install cython==0.29.37
          pip install buildozer

      - name: Configure Buildozer
        run: |
          buildozer init
          # تجنب تحميل NDK/SDK من الخوادم البطيئة
          sed -i 's/^# android.ndk = .*/android.ndk = 23.1.7779620/' buildozer.spec
          sed -i 's/^# android.sdk = .*/android.sdk = 30/' buildozer.spec
          sed -i 's/^requirements = .*/requirements = python3,kivy==2.2.1,requests/' buildozer.spec
          sed -i 's/^package.name = .*/package.name = CryptoHunter/' buildozer.spec
          sed -i 's/^package.domain = .*/package.domain = org.cryptohunter/' buildozer.spec
          sed -i 's/^source.dir = .*/source.dir = ./' buildozer.spec
          # تعطيل تحميل NDK عبر الإنترنت (استخدام المثبّت المحلي)
          sed -i 's/^# android.accept_sdk_license = .*/android.accept_sdk_license = True/' buildozer.spec
          echo "android.ndk_version = 23b" >> buildozer.spec

      - name: Pre-download NDK and SDK (to avoid timeout)
        run: |
          mkdir -p ~/.buildozer/android/platform/
          cd ~/.buildozer/android/platform/
          # تحميل SDK Command Line Tools (إصدار ثابت)
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O sdk-tools.zip
          unzip -q sdk-tools.zip -d android-sdk
          rm sdk-tools.zip
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          echo y | $ANDROID_SDK_ROOT/cmdline-tools/bin/sdkmanager --licenses
          $ANDROID_SDK_ROOT/cmdline-tools/bin/sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3"
          # تحميل NDK r23b
          wget -q https://dl.google.com/android/repository/android-ndk-r23b-linux.zip
          unzip -q android-ndk-r23b-linux.zip
          rm android-ndk-r23b-linux.zip
          cd -

      - name: Build APK
        run: |
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          export ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk-r23b
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CryptoHunter-APK
          path: bin/*.apk
